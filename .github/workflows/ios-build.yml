name: 🍎 Build iOS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to build'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      upload_to_testflight:
        description: 'Upload to TestFlight (Production only)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build-ios:
    name: 🔨 Build iOS
    runs-on: macos-latest
    
    steps:
    - name: 📁 Checkout repository
      uses: actions/checkout@v4

    - name: 🍎 Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true

    - name: 🔍 Verify Flutter installation
      run: flutter doctor -v

    - name: 📦 Get dependencies
      run: flutter pub get

    - name: 🍎 Install iOS dependencies
      run: |
        cd ios
        pod install --repo-update

    - name: 🧹 Clean previous builds
      run: flutter clean

    - name: 🔧 Import Code-Signing Certificates (Production only)
      if: github.event.inputs.environment == 'prod'
      uses: Apple-Actions/import-codesign-certs@v2
      with:
        p12-file-base64: ${{ secrets.IOS_DIST_SIGNING_KEY }}
        p12-password: ${{ secrets.IOS_DIST_SIGNING_KEY_PASSWORD }}

    - name: 📝 Import Provisioning Profile (Production only)
      if: github.event.inputs.environment == 'prod'
      uses: Apple-Actions/download-provisioning-profiles@v1
      with:
        bundle-id: cl.tocketicket.staffscanner
        issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
        api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
        api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

    - name: 🏗️ Build iOS (Debug - Dev)
      if: github.event.inputs.environment == 'dev'
      run: |
        flutter build ios --dart-define=ENVIRONMENT=${{ github.event.inputs.environment }} --debug --no-codesign

    - name: 🏗️ Build iOS (Release - Prod)
      if: github.event.inputs.environment == 'prod'
      run: |
        flutter build ios --dart-define=ENVIRONMENT=${{ github.event.inputs.environment }} --release

    - name: 📦 Create IPA (Production only)
      if: github.event.inputs.environment == 'prod'
      run: |
        cd ios
        xcodebuild -workspace Runner.xcworkspace \
                   -scheme Runner \
                   -sdk iphoneos \
                   -configuration Release \
                   -archivePath ./Runner.xcarchive \
                   archive

        xcodebuild -archivePath ./Runner.xcarchive \
                   -exportOptionsPlist ExportOptions.plist \
                   -exportPath ./build \
                   -allowProvisioningUpdates \
                   -exportArchive

    - name: 📤 Upload iOS Debug Build (Dev)
      uses: actions/upload-artifact@v4
      if: github.event.inputs.environment == 'dev'
      with:
        name: tocke-${{ github.event.inputs.environment }}-ios-debug
        path: build/ios/iphoneos/Runner.app

    - name: 📤 Upload to TestFlight
      if: github.event.inputs.environment == 'prod' && github.event.inputs.upload_to_testflight == 'true'
      id: testflight-upload
      uses: Apple-Actions/upload-testflight-build@v1
      with:
        app-path: ios/build/*.ipa
        issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
        api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
        api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
      continue-on-error: true

    - name: ⚠️ TestFlight Upload Failed
      if: github.event.inputs.environment == 'prod' && github.event.inputs.upload_to_testflight == 'true' && steps.testflight-upload.outcome == 'failure'
      run: |
        echo "❌ TestFlight upload failed. IPA is still available as artifact." >> $GITHUB_STEP_SUMMARY
        echo "📝 Check the logs above for details and upload manually if needed." >> $GITHUB_STEP_SUMMARY

    - name: 📤 Upload IPA Artifact (Backup)
      uses: actions/upload-artifact@v4
      if: github.event.inputs.environment == 'prod'
      with:
        name: tocke-${{ github.event.inputs.environment }}-ipa
        path: ios/build/*.ipa

    - name: 📊 Build Summary
      run: |
        echo "## 🎉 iOS Build Completed!" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Platform:** iOS" >> $GITHUB_STEP_SUMMARY
        echo "- **Built at:** $(date)" >> $GITHUB_STEP_SUMMARY
        
        if [[ "${{ github.event.inputs.environment }}" == "prod" ]]; then
          if [[ "${{ github.event.inputs.upload_to_testflight }}" == "true" ]]; then
            if [[ "${{ steps.testflight-upload.outcome }}" == "success" ]]; then
              echo "- **✅ TestFlight:** Build uploaded successfully ✈️" >> $GITHUB_STEP_SUMMARY
              echo "- **⏰ Processing:** Build will be available in ~10-15 minutes" >> $GITHUB_STEP_SUMMARY
              echo "- **🔗 Check Status:** [App Store Connect](https://appstoreconnect.apple.com)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **⚠️ TestFlight:** Upload failed, check logs above" >> $GITHUB_STEP_SUMMARY
              echo "- **💾 Backup:** IPA available as artifact for manual upload" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- **💾 Output:** IPA file ready for manual upload" >> $GITHUB_STEP_SUMMARY
            echo "- **📖 Guide:** See TESTFLIGHT_SETUP.md for manual upload steps" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "- **🔧 Output:** Debug build for development" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📱 App Information" >> $GITHUB_STEP_SUMMARY
        echo "- **Bundle ID:** cl.tocketicket.staffscanner" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Tool:** Flutter $(flutter --version | head -n 1 | cut -d ' ' -f 2)" >> $GITHUB_STEP_SUMMARY